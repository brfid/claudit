name: Guard

on:
  push:
    branches: [main]
  pull_request:

jobs:
  forbidden-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for forbidden runtime data files
        run: |
          set -e
          if git ls-files | grep -E '^(ledger|ingest_state)(\..+)?\.json$'; then
            echo "ERROR: repository contains protected runtime data files."
            echo "See .gitignore and scripts/pre-commit for rationale."
            exit 1
          fi
          echo "OK: no forbidden files committed."
